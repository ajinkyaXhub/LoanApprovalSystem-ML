<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Approval</title>
    <meta name="description" content="AI Loan Approval System">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h2>Loan Approval System</h2>

{% if prediction_text %}
<div class="result-box {% if 'Approved' in prediction_text %}approved{% else %}rejected{% endif %}">
    
    <div class="result-title">{{ prediction_text }}</div>

    <div class="confidence">Confidence: {{ confidence }}</div>

    {% if reason %}
    <div class="reason">Reason: {{ reason }}</div>
    {% endif %}

</div>
{% endif %}

<form action="/predict" method="post">

<div class="form-grid">

<div class="section">
    <h3>Personal Details</h3>

    <label>Dependents</label>
    <input type="number" name="dependents" required>

    <label>Education</label>
    <select name="education">
        <option>Graduate</option>
        <option>Not Graduate</option>
    </select>

    <label>Self Employed</label>
    <select name="self_employed">
        <option>No</option>
        <option>Yes</option>
    </select>
</div>

<div class="section">
    <h3>Financial Details</h3>

    <label>Annual Income</label>
    <input type="number" name="income" required>

    <label>Loan Amount</label>
    <input type="number" name="loan_amount" required>

    <label>Loan Term</label>
    <input type="number" name="loan_term" required>

    <label>CIBIL Score</label>
    <input type="number" name="cibil" required>
</div>

<div class="section">
    <h3>Assets</h3>

    <input type="number" name="res_assets" placeholder="Residential Assets">
    <input type="number" name="com_assets" placeholder="Commercial Assets">
</div>

<div class="section">
    <h3>Additional</h3>

    <input type="number" name="lux_assets" placeholder="Luxury Assets">
    <input type="number" name="bank_assets" placeholder="Bank Balance">
</div>

</div>

<button type="submit">Analyze Loan</button>

</form>

</div>

</body>
</html>
